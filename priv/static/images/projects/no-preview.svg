<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 72" width="90" height="72" role="img" aria-label="no preview">
  <!-- paper background -->
  <rect width="90" height="72" fill="#ede6d8"/>

  <!-- top hairline rule -->
  <line x1="10" y1="18" x2="80" y2="18" stroke="#d6cdb8" stroke-width="0.6"/>

  <!-- dot-rule decorative band -->
  <g fill="#d6cdb8">
    <circle cx="14" cy="36" r="0.9"/>
    <circle cx="20" cy="36" r="0.9"/>
    <circle cx="26" cy="36" r="0.9"/>
    <circle cx="32" cy="36" r="0.9"/>
    <circle cx="38" cy="36" r="0.9"/>
    <circle cx="44" cy="36" r="0.9"/>
    <circle cx="50" cy="36" r="0.9"/>
    <circle cx="56" cy="36" r="0.9"/>
    <circle cx="62" cy="36" r="0.9"/>
    <circle cx="68" cy="36" r="0.9"/>
    <circle cx="74" cy="36" r="0.9"/>
  </g>

  <!-- bottom hairline rule -->
  <line x1="10" y1="54" x2="80" y2="54" stroke="#d6cdb8" stroke-width="0.6"/>

  <!-- editorial mark: terracotta § -->
  <text x="45" y="14" text-anchor="middle"
        font-family="'Newsreader','Source Serif Pro',Georgia,serif"
        font-size="9" font-style="italic" fill="#c0532c">§</text>

  <!-- mono caption -->
  <text x="45" y="66" text-anchor="middle"
        font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,monospace"
        font-size="6.5" letter-spacing="1.2" fill="#6a635a">№ —</text>
</svg>
